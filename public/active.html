<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aktiv Seanslar</title>
  <link rel="icon" type="image/x-icon" href="images/favicon.ico">
  <link rel="stylesheet" href="active.css">
</head>
<body>
  <div class="container">
    <section class="section active-sessions-section">
      <h2>🎮 Aktiv Seanslar</h2>
      <div class="table-wrapper">
        <div id="tableContent" class="table-content">
          <table class="sessions-table" id="activeOnlyTable">
            <thead>
              <tr>
                <th>Ad</th>
                <th>Yaş</th>
                <th>Zona</th>
                <th>Başlama Vaxtı</th>
                <th>Qalan Vaxt</th>
              </tr>
            </thead>
            <tbody id="activeOnlyTableBody">
              <!-- Rows will be added dynamically -->
            </tbody>
          </table>
        </div>
        <div id="customMessagePage" class="custom-message-page"></div>
        <p id="noActiveOnlyMsg" class="no-data-msg is-hidden">Aktiv seans yoxdur.</p>
      </div>
      <div id="pageIndicator" class="page-indicator is-hidden">Səhifə 1 / 1</div>
    </section>
  </div>

  <script src="active.js"></script>
</body>
</html>
